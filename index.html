<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMaster Online — Угадай место на планете</title>
    
    <!-- Стили и библиотека синхронизации -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="game-container">
        <!-- ЛОББИ: ЭКРАН ВХОДА -->
        <div id="auth-screen" class="view">
            <div class="logo-zone">
                <span class="logo-icon">🌍</span>
                <h1>GeoMaster <span>Online</span></h1>
                <p>Соревнуйся с друзьями в знании планеты прямо с телефона</p>
            </div>

            <div class="form-box">
                <div class="input-field">
                    <label for="room-input">Код комнаты</label>
                    <input type="text" id="room-input" placeholder="Например: 7777">
                </div>
                
                <div class="input-field">
                    <label for="name-input">Твоё имя</label>
                    <input type="text" id="name-input" placeholder="Как тебя зовут?">
                </div>

                <div class="action-buttons">
                    <button class="btn btn-create" onclick="initGame(true)">Создать лобби</button>
                    <button class="btn btn-join" onclick="initGame(false)">Войти к друзьям</button>
                </div>
            </div>
        </div>

        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="game-screen" class="view hidden">
            <!-- Верхняя панель инфо -->
            <div class="top-status-bar">
                <div class="room-badge">🚪 Комната: <span id="display-room">----</span></div>
                <div id="game-status" class="status-msg">Где это находится? 🤔</div>
            </div>

            <!-- Изображение секретной локации -->
            <div class="photo-viewer">
                <img id="target-image" src="" alt="Загадочное место">
                <div class="photo-overlay"></div>
            </div>

            <p class="instruction">Изучи детали фото и кликни по карте мира внизу:</p>

            <!-- Интерактивная карта мира -->
            <div class="map-wrapper">
                <div id="world-map" onclick="onMapClick(event)">
                    <!-- Сюда JS будет крепить твою метку -->
                    <div id="map-pin" class="hidden">📍</div>
                </div>
            </div>

            <!-- Список игроков в комнате и их статусы -->
            <div class="players-section">
                <h4>Игроки в комнате:</h4>
                <div id="players-chips" class="chips-container"></div>
            </div>

            <!-- Управление раундами (только для создателя лобби) -->
            <div id="host-controls" class="hidden">
                <button class="btn btn-next" onclick="triggerNextRound()">Следующий раунд 🚀</button>
            </div>
        </div>
    </div>

    <!-- Твой файл логики -->
    <script src="script.js"></script>
</body>
</html>
