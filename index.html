<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBattle — Поймай миллисекунду</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- ЭКРАН 1: ВХОД -->
        <div id="auth-screen" class="screen-view">
            <div class="hero-zone">
                <div class="pulse-circle">⏱️</div>
                <h1>Time<span>Battle</span></h1>
                <p>Почувствуй время. Битва на миллисекунды с друзьями на одном экране!</p>
            </div>

            <div class="login-form">
                <input type="text" id="room-input" placeholder="Название вашей компании (например: Бро)">
                <input type="text" id="name-input" placeholder="Твоё имя">
                <div class="button-row">
                    <button class="neon-btn purple" style="width: 100%; flex: none;" onclick="startTimeGame(true)">Начать баттл 🎮</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН 2: ИГРА -->
        <div id="game-screen" class="screen-view hidden">
            <div class="top-nav">
                <span class="badge">Группа: <b id="room-id">---</b></span>
                <span id="game-status" class="status-indicator">Ожидание нажатия...</span>
            </div>

            <div class="target-display">
                <p>Цель раунда:</p>
                <div id="target-time">0.00</div>
                <span>секунд</span>
            </div>

            <!-- Главная неоновая кнопка удержания -->
            <div class="pad-area">
                <button id="action-pad" 
                        onmousedown="startHolding()" 
                        onmouseup="stopHolding()" 
                        ontouchstart="startHolding(event)" 
                        ontouchend="stopHolding(event)">
                    ЗАЖМИ И ДЕРЖИ
                </button>
            </div>

            <!-- Список участников и результаты -->
            <div class="results-layout">
                <h3>Участники баттла:</h3>
                <div id="leaderboard" class="players-list">
                    <!-- Сюда JS будет рендерить карточки игроков -->
                </div>
            </div>

            <!-- Кнопка добавления нового игрока (в этой же сессии) -->
            <div class="button-row" style="margin-top: 10px;">
                <button class="neon-btn" onclick="location.reload();">➕ Добавить игрока</button>
                <button id="host-next-btn" class="neon-btn yellow hidden" onclick="nextTimeRound()">Новый раунд 🚀</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
